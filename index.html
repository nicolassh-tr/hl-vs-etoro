}

        setLoadWarning("Some feeds did not load on this network (WiFi often blocks crypto/API domains). What loaded is shown below; try mobile data for full data.");
      }
    } catch (err) { setError(fetchErrorHint(err)); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);
  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 14, background: "#f8fafc" }}>
      <div style={{ width: 32, height: 32, border: "3px solid #00e5a0", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <div style={{ color: "#64748b", fontSize: 13 }}>Loading live data...</div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
  if (error) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 12, background: "#f8fafc" }}>
      <div style={{ fontSize: 26 }}>⚠️</div>
      <div style={{ color: "#ef4444", fontWeight: 700, fontSize: 13 }}>{error}</div>
      <button onClick={load} style={{ padding: "9px 18px", background: "#00e5a0", color: "#fff", border: "none", borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>Retry</button>
    </div>
  );
  const isMobile = width < 600;
  return (
    <div ref={containerRef} style={{ background: "#f8fafc", minHeight: "100vh", fontFamily: "'Inter',system-ui,sans-serif", color: "#0f172a" }}>
      <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: "10px 14px", position: "sticky", top: 0, zIndex: 50, boxShadow: "0 1px 3px rgba(0,0,0,0.05)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontWeight: 900, fontSize: 15 }}>HL vs eToro</div>
          <div style={{ fontSize: 10, color: "#94a3b8" }}>1-min candles · live · UTC</div>
        </div>
        <button onClick={load} style={{ background: "#f1f5f9", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>🔄 Refresh</button>
      </div>
      <div style={{ padding: "12px 8px", maxWidth: 1400, margin: "0 auto" }}>
        {loadWarning && (
          <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", color: "#92400e", borderRadius: 10, padding: "10px 12px", fontSize: 12, fontWeight: 600, marginBottom: 12 }}>
            {loadWarning}
          </div>
        )}
        <SkewSynopsis instruments={[
          { label: "NQ100",  icon: "📈", etCandles: etNQCandles,     hlCandles: hlCandles },
          { label: "Gold",   icon: "🥇", etCandles: etGoldCandles,   hlCandles: hlGoldCandles },
          { label: "Oil",    icon: "🛢️", etCandles: etOilCandles,    hlCandles: hlOilCandles },
          { label: "NatGas", icon: "🔥", etCandles: etNatGasCandles, hlCandles: hlNatGasCandles, decimals: 3 },
        ]} />
        <SectionHeader label="📈 NQ100 Index" />
        <InstrumentPanel aLabel="Hyperliquid" aTag="HL" aColor={HL_COLOR} aCandles={hlCandles} aSymbol="xyz:XYZ100" bLabel="eToro" bTag="eT" bColor={ET_COLOR} bCandles={etNQCandles} width={width} isMobile={isMobile} />
        <SectionHeader label="🥇 Gold" />
        <InstrumentPanel aLabel="Hyperliquid" aTag="HL" aColor={HL_COLOR} aCandles={hlGoldCandles} aSymbol="xyz:GOLD" bLabel="eToro" bTag="eT" bColor={ET_COLOR} bCandles={etGoldCandles} width={width} isMobile={isMobile} />
        <SectionHeader label="🛢️ Oil" />
        <InstrumentPanel aLabel="Hyperliquid" aTag="HL" aColor={HL_COLOR} aCandles={hlOilCandles} aSymbol="xyz:CL" bLabel="eToro" bTag="eT" bColor={ET_COLOR} bCandles={etOilCandles} width={width} isMobile={isMobile} />
        <SectionHeader label="🔥 Natural Gas" />
        <InstrumentPanel aLabel="Hyperliquid" aTag="HL" aColor={HL_COLOR} aCandles={hlNatGasCandles} aSymbol="xyz:NATGAS" bLabel="eToro" bTag="eT" bColor={ET_COLOR} bCandles={etNatGasCandles} width={width} isMobile={isMobile} />
        <div style={{ textAlign: "center", fontSize: 10, color: "#94a3b8", paddingBottom: 20, marginTop: 4 }}>Hyperliquid · eToro (your configured backend) · 1-min · Live</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<HLvsToro />);
  </script>
</body>
</html>
