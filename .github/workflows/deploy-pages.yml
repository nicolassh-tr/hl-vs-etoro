# Serves index.html at https://<user>.github.io/<repo>/
# After first push: Repo → Settings → Pages → Build: GitHub Actions → save.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh same-origin eToro cache (~4×/day). Disable by removing this block if you prefer push-only updates.
    - cron: "25 6,12,18,0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/configure-pages@v5
      - name: Fetch eToro server-side → cached-feed.json
        env:
          ETORO_INSTRUMENT_OIL: ${{ vars.ETORO_INSTRUMENT_OIL }}
          ETORO_INSTRUMENT_NQ: ${{ vars.ETORO_INSTRUMENT_NQ }}
          ETORO_INSTRUMENT_GOLD: ${{ vars.ETORO_INSTRUMENT_GOLD }}
          ETORO_INSTRUMENT_NATGAS: ${{ vars.ETORO_INSTRUMENT_NATGAS }}
        run: node scripts/build-cached-feed.mjs
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp cached-feed.json _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
