# Serves index.html at https://<user>.github.io/<repo>/
# After first push: Repo → Settings → Pages → Build: GitHub Actions → save.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/configure-pages@v5
      - name: Build static site (eToro cache + HTML)
        env:
          ETORO_INSTRUMENT_NQ: ${{ vars.ETORO_INSTRUMENT_NQ }}
          ETORO_INSTRUMENT_GOLD: ${{ vars.ETORO_INSTRUMENT_GOLD }}
          ETORO_INSTRUMENT_SILVER: ${{ vars.ETORO_INSTRUMENT_SILVER }}
          ETORO_INSTRUMENT_OIL: ${{ vars.ETORO_INSTRUMENT_OIL }}
          ETORO_INSTRUMENT_NATGAS: ${{ vars.ETORO_INSTRUMENT_NATGAS }}
        run: |
          set -e
          node scripts/build-cached-feed.mjs
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('cached-feed.json','utf8'));if(j.updatedAt==null||typeof j.updatedAt!=='string'){console.error('bad updatedAt',j);process.exit(1);}const L=Object.fromEntries(Object.keys(j.etoro).map(k=>[k,j.etoro[k].length]));console.log('cache ok',j.updatedAt,L);"
          mkdir -p _site
          cp index.html _site/
          cp cached-feed.json _site/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Password-protect HTML
        env:
          REPORT_USER: ${{ secrets.REPORT_USER }}
          REPORT_PASS: ${{ secrets.REPORT_PASS }}
        run: |
          pip install cryptography
          python scripts/protect_html.py _site/index.html _site/index.html \
            -u "$REPORT_USER" -p "$REPORT_PASS" -t "HL vs eToro"
          echo "## Pages artifact" >> "$GITHUB_STEP_SUMMARY"
          ls -la _site >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**cached-feed.json bytes:** $(wc -c < _site/cached-feed.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "**updatedAt prefix:** $(head -c 80 _site/cached-feed.json)" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
